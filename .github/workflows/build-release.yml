name: Build Release

on:
  workflow_dispatch:
    inputs:
      versionName:
        required: true
        description: This releases version name
        default: "1.0.0"
      versionCode:
        required: true
        description: This releases version code
        default: "1000"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@master

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2.0.10

      - name: Set Version
        uses: chkfung/android-version-actions@v1.1
        with:
          gradlePath: app/build.gradle.kts
          versionCode: ${{github.event.inputs.versionCode}}
          versionName: ${{github.event.inputs.versionName}}

      - name: Build Signed APK
        run: |
          set -e
          if [ -n "${{ secrets.keystore }}" ]; then
            echo "${{ secrets.keystore }}" | base64 -d > $GITHUB_WORKSPACE/signing-key.jks
          else
            keytool -genkeypair \
              -alias release \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=CI,O=GitHub Actions,C=US" \
              -keystore $GITHUB_WORKSPACE/signing-key.jks \
              -storepass changeit \
              -keypass changeit
          fi
          chmod +x ./gradlew
          STORE_PASSWORD="${{ secrets.keystore_password }}"
          KEY_ALIAS="${{ secrets.key_alias }}"
          KEY_PASSWORD="${{ secrets.key_password }}"
          if [ -z "$STORE_PASSWORD" ]; then STORE_PASSWORD=changeit; fi
          if [ -z "$KEY_ALIAS" ]; then KEY_ALIAS=release; fi
          if [ -z "$KEY_PASSWORD" ]; then KEY_PASSWORD="$STORE_PASSWORD"; fi
          ./gradlew packageReleaseUniversalApk \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/signing-key.jks \
            -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Release
        run: |
          mv app/build/outputs/apk_from_bundle/release/app-release-universal.apk ./Manager.apk
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          tag="${{ github.event.inputs.versionCode }}"
          git tag "$tag"
          git push origin "$tag"
          gh release create "$tag" \
            --title "${{ github.event.inputs.versionName }}" \
            --generate-notes \
            ./Manager.apk
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'